<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LT3 Memory Game!</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  </head>
  <body>

    <!-- Intro Screen -->
    <div id="intro-screen">
      <div id="intro-main">
        <div id="intro-top">
          <div id="intro-left">
            <img src="favicon.png" alt="LT3 logo" id="intro-char" />
          </div>
          <div id="intro-right">
            <div id="intro-title">LT3 Memory Game!</div>
          </div>
        </div>
        <div id="intro-click-hint">click anywhere to begin</div>
      </div>
    </div>

    <!-- Game -->
    <div id="game" class="hidden">
      <h1>LT3 Memory Game!</h1>
      <p id="status">Ready to play?</p>
      <div id="level-dots"></div>
      <div id="stats">
        <span id="move-count">Moves: 0</span>
        <span id="timer">Time: 0s</span>
        <span id="best-time">Best: --</span>
      </div>
      <div id="countdown"></div>
      <div id="level-splash"></div>
      <button id="start-btn" onclick="startGame()">Play</button>

      <!-- Scorecard -->
      <div id="scorecard-wrap">
        <div id="scorecard">
          <img id="scorecard-img" src="" alt="" />
          <div id="scorecard-info">
            <div id="scorecard-top">
              <div id="scorecard-time"></div>
              <div id="scorecard-message"></div>
              <div id="scorecard-sub"></div>
            </div>
            <div id="scorecard-brand">
              <div id="scorecard-game-title">LT3 Memory Game!</div>
              <img src="favicon.png" alt="LT3" id="scorecard-favicon" />
            </div>
          </div>
        </div>
        <button id="download-btn" onclick="downloadScorecard()">Download Score Card</button>
        <button id="play-again" onclick="restartGame()">Play Again</button>
      </div>

      <div id="win-title"></div>
      <div id="win-stats"></div>
      <div id="board"></div>
    </div>

    <!-- Audio Controls - Outside game container to prevent transform issues -->
    <div id="audio-controls">
      <div id="radio-controls">
        <img id="radio-icon" src="radioon.png" alt="Radio" onclick="toggleRadioMute()" />
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.25" oninput="updateMusicVolume()" />
      </div>
      <div id="skip-controls">
        <button id="skip-prev" onclick="skipSong(-1)">◀</button>
        <button id="play-pause-btn" onclick="togglePlayPause()">⏸</button>
        <button id="skip-next" onclick="skipSong(1)">▶</button>
      </div>
      <div id="sfx-controls">
        <span id="sfx-label">SFX:</span>
        <button id="sfx-toggle" onclick="toggleSoundEffects()" class="sfx-on">
          <span id="sfx-toggle-slider"></span>
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
